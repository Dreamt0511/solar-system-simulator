<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>太阳系模拟器</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 横屏提示 -->
    <div id="orientation-warning" class="hidden">
        <div class="warning-content">
            <p>请旋转设备至横屏模式以获得最佳体验</p>
        </div>
    </div>

    <!-- 加载界面 -->
    <div id="loading-screen">
        <div class="loading-content">
            <h1>太阳系模拟器</h1>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p id="loading-text">正在加载...</p>
        </div>
    </div>

    <!-- 主画布 -->
    <canvas id="solar-system-canvas"></canvas>

    <!-- 行星列表 -->
    <div id="planet-list">
      <button id="planet-list-toggle" title="天体列表">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div id="planet-list-panel" class="hidden">
        <div class="planet-list-header">天体</div>
        <div id="planet-list-items"></div>
      </div>
    </div>

    <!-- 设置图标 -->
    <button id="settings-btn" class="settings-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </button>

    <!-- 控制面板 -->
    <div id="controls-panel" class="hidden">
        <div class="panel-header">
            <h3>控制面板</h3>
            <button id="close-panel">×</button>
        </div>
        <div class="panel-content">
            <div class="control-group">
                <label>时间速度</label>
                <input type="range" id="time-speed" min="0.1" max="100" step="0.1" value="1">
                <span id="time-speed-value">1x</span>
            </div>
            <div class="control-group">
                <button id="pause-btn">暂停</button>
                <button id="reset-btn">重置视角</button>
            </div>
            <div class="control-group">
                <label>真实纹理</label>
                <button id="texture-toggle" disabled>加载中...</button>
            </div>
        </div>
    </div>

    <!-- 信息面板 -->
    <div id="info-panel" class="hidden">
        <div class="panel-header">
            <h3 id="planet-name">行星名称</h3>
            <button id="close-info">×</button>
        </div>
        <div class="panel-content">
            <div class="info-row">
                <span class="label">半径：</span>
                <span id="planet-radius" class="value">-</span>
            </div>
            <div class="info-row">
                <span class="label">质量：</span>
                <span id="planet-mass" class="value">-</span>
            </div>
            <div class="info-row">
                <span class="label">距太阳：</span>
                <span id="planet-distance" class="value">-</span>
            </div>
            <div class="info-row">
                <span class="label">公转周期：</span>
                <span id="planet-period" class="value">-</span>
            </div>
            <div class="info-row">
                <span class="label">卫星：</span>
                <span id="planet-moons" class="value">-</span>
            </div>
        </div>
    </div>

    <!-- 暗淡蓝点引文弹窗 -->
    <div id="pale-blue-dot" class="hidden">
        <div class="quote-backdrop"></div>
        <div class="quote-container">
            <button class="quote-close">&times;</button>
            <div class="quote-content">
                <div class="quote-planet-icon"></div>
                <p class="quote-text"></p>
                <p class="quote-author"></p>
            </div>
        </div>
    </div>

    <!-- Three.js 和模块 -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="js/main.js"></script>
    <script>
        // 超时保护：10秒后强制隐藏加载界面
        setTimeout(function() {
            var loading = document.getElementById('loading-screen');
            if (loading && loading.style.display !== 'none') {
                loading.style.display = 'none';
                console.warn('加载超时，强制隐藏加载界面');
            }
        }, 10000);
    </script>
</body>
</html>
